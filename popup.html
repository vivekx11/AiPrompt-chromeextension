<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Prompt Enhancer</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 20px;
      margin: 0 0 15px 0;
      color: #333;
    }
    
    .info {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #667eea;
    }
    
    .info p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }
    
    .api-section {
      background: #fff3cd;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      border-left: 4px solid #ffc107;
    }
    
    .api-section h2 {
      font-size: 16px;
      margin: 0 0 10px 0;
      color: #333;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #667eea;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
      margin: 10px 0;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
    }
    
    button:hover {
      background: #5568d3;
    }
    
    .status {
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      font-size: 13px;
      display: none;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    
    .history-section {
      margin-top: 20px;
    }
    
    .history-section h2 {
      font-size: 16px;
      color: #333;
      margin-bottom: 10px;
    }
    
    .history-item {
      background: #f9f9f9;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border-left: 3px solid #764ba2;
    }
    
    .history-item .timestamp {
      font-size: 11px;
      color: #999;
      margin-bottom: 5px;
    }
    
    .history-item .text {
      font-size: 13px;
      color: #333;
      margin: 5px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .clear-btn {
      background: #ff4444;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 10px;
    }
    
    .clear-btn:hover {
      background: #cc0000;
    }
    
    .no-history {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 14px;
    }
    
    a {
      color: #667eea;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>AI Prompt Enhancer</h1>
  
  <div class="info">
    <p><strong>Kaise use karein:</strong></p>
    <p>1. Text select karein</p>
    <p>2. Right-click → "🤖 Enhance Prompt"</p>
    <p>3. Ya Ctrl+Shift+E press karein</p>
  </div>
  
  <div class="api-section">
    <h2>🔑 Gemini API Key</h2>
    <p style="font-size: 12px; color: #666;">Get your free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a></p>
    <input type="text" id="apiKey" placeholder="Enter your Gemini API key">
    <button id="saveKey">Save API Key</button>
    <div id="status" class="status"></div>
  </div>
  
  <div class="history-section">
    <h2>📜 Recent History</h2>
    <div id="history-list"></div>
    <button class="clear-btn" id="clear-history">Clear History</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
